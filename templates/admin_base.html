<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}لوحة المشرف{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
  </style>
</head>
<body>

  <!-- ✅ شريط علوي -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">لوحة المشرف</span>
    <div class="text-white">{{ current_user.username if current_user.is_authenticated else 'ضيف' }}</div>
  </nav>

  <!-- ✅ محتوى الصفحة -->
  <main class="container py-4">
    {% block admin_content %}
    <div class="alert alert-warning text-center">
      ⚠️ لم يتم توفير محتوى بعد لهذا البلوك.
    </div>
    {% endblock %}
  </main>

  <!-- ✅ التذييل -->
  <footer class="text-center text-muted py-4 border-top">
    All rights reserved - 2025 ©
  </footer>

</body>
</html>
